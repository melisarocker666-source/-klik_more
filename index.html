    const STYLE_TONES = ["Persuasif", "Friendly & Conversational", "Empathetic", "Urgent / Scarcity", "Edukatif", "Minimalist & Zen", "Professional & Formal"];
    const TITLE_HOOKS = ["Panduan Lengkap: [KW]", "Blueprint [KW] Masa Depan", "Rahasia Sukses [KW] ala Pro", "Masterclass: Strategi [KW] Terapan", "Seni Menguasai [KW] untuk [AUD]"];

    const getDict = (lang) => {
      const isEn = lang === "English";
      return {
        intro: isEn ? "INTRODUCTION" : "KATA PENGANTAR",
        toc: isEn ? "TABLE OF CONTENTS" : "DAFTAR ISI",
        conclusion: isEn ? "CONCLUSION" : "KESIMPULAN & PENUTUP",
        bio: isEn ? "ABOUT THE AUTHOR" : "TENTANG PENULIS",
        chapter: isEn ? "CHAPTER" : "BAB",
        by: isEn ? "By" : "Oleh",
        specialEdition: isEn ? "SPECIAL EDITION" : "EDISI KHUSUS",
        specialEditionFor: isEn ? "Special Edition For:" : "Edisi Khusus Untuk:",
        exclusiveEbook: isEn ? "EXCLUSIVE E-BOOK" : "E-BOOK EKSKLUSIF",
        titleLabel: isEn ? "TITLE" : "JUDUL",

        audienceLabel: isEn ? "AUDIENCE" : "AUDIEN",

      };
    };

    const stripHTML = (html) => {
      if (!html) return "";
      const tmp = document.createElement("DIV");
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || "";
    };

    function getRandomFromList(items = [], excludeValue = "") {
      const safeItems = items.filter(Boolean);
      if (safeItems.length === 0) return "";
      const candidates = safeItems.filter((item) => item !== excludeValue);
      const pool = candidates.length > 0 ? candidates : safeItems;
      return pool[Math.floor(Math.random() * pool.length)] ?? "";
    }

    function getPersonaConfig(personaId) {
      return PERSONAS.find((item) => item.id === personaId) ?? PERSONAS[0];
    }

    function copyRichTextToClipboard(htmlString) {
      const el = document.createElement('div');
      el.innerHTML = htmlString;
      el.style.position = 'fixed';
      el.style.left = '-9999px';
      document.body.appendChild(el);
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(el);
      selection?.removeAllRanges();
      selection?.addRange(range);
      let success = false;
      try { success = document.execCommand('copy'); } catch (err) { console.error(err); }
      selection?.removeAllRanges();
      document.body.removeChild(el);
      return success;
    }

    const detectTextProvider = (key) => {
      const k = key.trim();
      if (k === "4ea665a7a8c8203f84db7fd6eee8039d285ab33402545fa7027b5d089cb9dab6") return { name: "Pihak Ke-3 (Gemini 3 Pro)", color: "bg-purple-100 text-purple-700 border-purple-200 ring-1 ring-purple-200" };
      if (!k) return { name: "Sistem Default (Gemini)", color: "bg-slate-100 text-slate-500 border-slate-200" };
      if (k.startsWith("gsk_")) return { name: "Groq (Llama 3)", color: "bg-orange-100 text-orange-700 border-orange-200 ring-1 ring-orange-200" };
      if (k.startsWith("sk-") && !k.startsWith("sk-or-")) return { name: "OpenAI (GPT-4o)", color: "bg-emerald-100 text-emerald-700 border-emerald-200 ring-1 ring-emerald-200" };
      if (k.startsWith("AIza")) return { name: "Google Gemini", color: "bg-blue-100 text-blue-700 border-blue-200 ring-1 ring-blue-200" };
      if (k.length === 64 && /^[0-9a-fA-F]+$/.test(k) || k.startsWith("sk-or-")) return { name: "Pihak Ke-3 (OpenRouter)", color: "bg-purple-100 text-purple-700 border-purple-200 ring-1 ring-purple-200" };
      return { name: "Key Alternatif (Custom)", color: "bg-purple-100 text-purple-700 border-purple-200 ring-1 ring-purple-200" };
    };

    const detectImageProvider = (key) => {
      const k = key.trim();
      if (k === "2e2a664268266405f1d7e4d6a6d1f45949d3e742bb679dfaa69795e030df24cb") return { name: "Pihak Ke-3 (Gemini Flash Image)", color: "bg-purple-100 text-purple-700 border-purple-200 ring-1 ring-purple-200" };
      if (!k) return { name: "Sistem Default (Imagen 4.0)", color: "bg-slate-100 text-slate-500 border-slate-200" };
      if (k.startsWith("sk-") && !k.startsWith("sk-or-")) return { name: "OpenAI (DALL-E 3)", color: "bg-emerald-100 text-emerald-700 border-emerald-200 ring-1 ring-emerald-200" };
      if (k.length === 64 && /^[0-9a-fA-F]+$/.test(k) || k.startsWith("sk-or-")) return { name: "Sistem Gambar (Fallback)", color: "bg-slate-100 text-slate-600 border-slate-200" };
      if (k.startsWith("AIza")) return { name: "Google Imagen", color: "bg-blue-100 text-blue-700 border-blue-200 ring-1 ring-blue-200" };
      return { name: "Key Alternatif (Fallback)", color: "bg-purple-100 text-purple-700 border-purple-200 ring-1 ring-purple-200" };
    };

    const apiKey = ""; 

    const compressImage = (base64Str) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800; 
          let width = img.width;
          let height = img.height;

          if (width > MAX_WIDTH) {
            height = Math.round((height * MAX_WIDTH) / width);
            width = MAX_WIDTH;
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          
          if(ctx) {
              ctx.fillStyle = "#FFFFFF"; 
              ctx.fillRect(0, 0, width, height);
              ctx.drawImage(img, 0, 0, width, height);
          }
          
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = () => {
            console.warn("Gagal mengompres gambar, menggunakan versi asli.");
            resolve(base64Str);
        };
        img.src = base64Str;
      });
    };

    async function callAIProviderAPI(prompt, customKey, signal) {
      const trimmedKey = customKey.trim();
      let currentKey = trimmedKey || apiKey;
      const delays = [1000, 2000, 4000, 8000, 16000];

      for (let attempt = 0; attempt < 5; attempt++) {
        try {
          if (currentKey.startsWith("gsk_")) {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": `Bearer ${currentKey}` },
              body: JSON.stringify({ model: "llama3-70b-8192", messages: [{ role: "user", content: prompt }], temperature: 0.7 }),
              signal 
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(data.error?.message || `Error Groq HTTP ${response.status}`);
            return data.choices[0].message.content;
          } 
          else if (currentKey.startsWith("sk-") && !currentKey.startsWith("sk-or-")) {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": `Bearer ${currentKey}` },
              body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "user", content: prompt }], temperature: 0.7 }),
              signal 
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(data.error?.message || `Error OpenAI HTTP ${response.status}`);
            return data.choices[0].message.content;
          } 
          else if ((currentKey.length === 64 && /^[0-9a-fA-F]+$/.test(currentKey)) || currentKey.startsWith("sk-or-")) {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
              method: "POST",
              headers: { 
                  "Content-Type": "application/json", 
                  "Authorization": `Bearer ${currentKey}`,
                  "HTTP-Referer": "https://ebook-asia-pro.web.app",
                  "X-Title": "Ebook Asia Pro"
              },
              body: JSON.stringify({ model: "google/gemini-3-pro-preview", messages: [{ role: "user", content: prompt }], temperature: 0.7 }),
              signal 
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.error?.message || `Error OpenRouter HTTP ${response.status}`);
            }
            return data.choices[0].message.content;
          }
          else {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${currentKey}`;
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
              signal 
            });
            const data = await response.json().catch(() => ({}));
            
            if (!response.ok) {
              if (response.status === 400 || response.status === 403 || data.error?.message?.includes("API key not valid")) {
                if (currentKey !== apiKey) { currentKey = apiKey; attempt--; continue; }
                throw new Error("API Key sistem default tidak valid.");
              }
              if (response.status === 429) throw new Error("RATE_LIMIT");
              throw new Error(data.error?.message || `Error Gemini HTTP ${response.status}`);
            }
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
          }
        } catch (e) {
          if (e.name === "AbortError") throw new Error("STOP");

          const isNetworkError = e.message === "Failed to fetch" || e.name === "TypeError";
          if (isNetworkError) throw new Error("Gagal menyambung ke Server AI (Error Jaringan/CORS).");
          if (e.message.includes("tidak sah") || e.message.includes("habis")) throw new Error(e.message);
          
          if ((currentKey.length === 64 || currentKey.startsWith("sk-or-")) && currentKey !== apiKey) {
              currentKey = apiKey;
              attempt--;
              continue;
          }
          
          if (attempt === 4) throw new Error(e.message === "RATE_LIMIT" ? "Sistem sedang sibuk." : "Gagal menyambung ke server AI.");
          await new Promise(res => setTimeout(res, delays[attempt]));
        }
      }
      return "";
    }

    async function callImageProviderAPI(prompt, customImageKey, signal) {
      const trimmedImageKey = customImageKey.trim();
      let currentKey = trimmedImageKey || apiKey;
      
      let endpointsToTry = [];

      if (currentKey.startsWith("sk-") && !currentKey.startsWith("sk-or-")) {
          endpointsToTry.push({ type: 'openai', key: currentKey });
      } else if ((currentKey.length === 64 && /^[0-9a-fA-F]+$/.test(currentKey)) || currentKey.startsWith("sk-or-")) {
          currentKey = apiKey; 
      }

      endpointsToTry.push({ type: 'imagen-object', key: currentKey });
      endpointsToTry.push({ type: 'imagen-array', key: currentKey });
      endpointsToTry.push({ type: 'gemini-flash', key: currentKey });

      let lastErrorMsg = "";
      let rawImageBase64 = "";

      for (let endpoint of endpointsToTry) {
          try {
              if (endpoint.type === 'openai') {
                  const res = await fetch("https://api.openai.com/v1/images/generations", {
                      method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${endpoint.key}` },
                      body: JSON.stringify({ model: "dall-e-3", prompt: prompt, n: 1, size: "1024x1024", response_format: "b64_json" }),
                      signal 
                  });
                  const data = await res.json();
                  if (res.ok && data.data?.[0]?.b64_json) {
                      rawImageBase64 = `data:image/png;base64,${data.data[0].b64_json}`;
                      return await compressImage(rawImageBase64); 
                  }
                  throw new Error(data.error?.message || "OpenAI Gagal");
              } 
              else if (endpoint.type === 'imagen-array') {
                  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${endpoint.key}`, {
                      method: "POST", headers: { "Content-Type": "application/json" },
                      body: JSON.stringify({ instances: [{ prompt: prompt }], parameters: { sampleCount: 1 } }),
                      signal 
                  });
                  const data = await res.json();
                  if (res.ok && data.predictions?.[0]?.bytesBase64Encoded) {
                      rawImageBase64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                      return await compressImage(rawImageBase64); 
                  }
                  throw new Error(data.error?.message || "Imagen Array Gagal");
              }
              else if (endpoint.type === 'imagen-object') {
                  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${endpoint.key}`, {
                      method: "POST", headers: { "Content-Type": "application/json" },
                      body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } }),
                      signal 
                  });
                  const data = await res.json();
                  if (res.ok && data.predictions?.[0]?.bytesBase64Encoded) {
                      rawImageBase64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                      return await compressImage(rawImageBase64); 
                  }
                  throw new Error(data.error?.message || "Imagen Object Gagal");
              }
              else if (endpoint.type === 'gemini-flash') {
                  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${endpoint.key}`, {
                      method: "POST", headers: { "Content-Type": "application/json" },
                      body: JSON.stringify({ contents: [{parts: [{ text: prompt }]}], generationConfig: { responseModalities: ["TEXT", "IMAGE"] } }),
                      signal 
                  });
                  const data = await res.json();
                  const base64 = data.candidates?.[0]?.content?.parts?.find((p) => p.inlineData)?.inlineData?.data;
                  if (res.ok && base64) {
                      rawImageBase64 = `data:image/png;base64,${base64}`;
                      return await compressImage(rawImageBase64); 
                  }
                  throw new Error(data.error?.message || "Gemini Flash Image Gagal");
              }
          } catch (err) {
              if (err.name === "AbortError") throw new Error("STOP");
              lastErrorMsg = err.message;
              continue;
          }
      }
      
      throw new Error(`Semua server pembuat gambar sedang sibuk atau error: ${lastErrorMsg}`);
    }

    // --- KOMPONEN UI ---

    const RichTextEditor = ({ value, onChange, className = "", minHeight = "200px", isError = false, disabled = false, placeholder = "Ketik konten di sini..." }) => {
      const editorRef = useRef(null);

      useEffect(() => {
        if (editorRef.current && value !== editorRef.current.innerHTML) {
          editorRef.current.innerHTML = value || "";
        }
      }, [value]);

      const handleFormat = (e, command, formatValue = undefined) => {
        e.preventDefault(); 
        if (disabled) return;
        document.execCommand(command, false, formatValue);
        editorRef.current?.focus();
      };

      const handleBlur = () => {
        if (editorRef.current) {
          onChange(editorRef.current.innerHTML);
        }
      };

      return (
        <div className={`flex flex-col border rounded-2xl overflow-hidden bg-white transition-all shadow-sm focus-within:ring-4 focus-within:ring-[#6956e8]/20 focus-within:border-[#6956e8] ${isError ? 'border-red-300 ring-red-100' : 'border-slate-200'}`}>
          
          <div className={`flex flex-wrap items-center gap-1 p-2 border-b ${isError ? 'bg-red-50/50 border-red-200' : 'bg-slate-50 border-slate-200'}`}>
            <button onMouseDown={(e) => handleFormat(e, 'bold')} disabled={disabled} className="p-2 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors disabled:opacity-50" title="Tebal (Bold)">
              <strong className="font-serif">B</strong>
            </button>
            <button onMouseDown={(e) => handleFormat(e, 'italic')} disabled={disabled} className="p-2 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors disabled:opacity-50" title="Miring (Italic)">
              <em className="font-serif">I</em>
            </button>
            <button onMouseDown={(e) => handleFormat(e, 'underline')} disabled={disabled} className="p-2 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors disabled:opacity-50" title="Garis Bawah (Underline)">
              <u className="font-serif">U</u>
            </button>
            
            <div className="w-px h-5 bg-slate-300 mx-1"></div>
            
            <button onMouseDown={(e) => handleFormat(e, 'formatBlock', 'H3')} disabled={disabled} className="px-3 py-1.5 text-slate-600 hover:bg-slate-200 rounded-lg text-xs font-black transition-colors disabled:opacity-50" title="Sub Judul (Heading 3)">
              H3
            </button>
            <button onMouseDown={(e) => handleFormat(e, 'formatBlock', 'P')} disabled={disabled} className="px-3 py-1.5 text-slate-600 hover:bg-slate-200 rounded-lg text-xs font-black transition-colors disabled:opacity-50" title="Paragraf Biasa">
              ¶
            </button>
            
            <div className="w-px h-5 bg-slate-300 mx-1"></div>
            
            <button onMouseDown={(e) => handleFormat(e, 'insertUnorderedList')} disabled={disabled} className="px-3 py-1.5 flex items-center gap-1 text-slate-600 hover:bg-slate-200 rounded-lg text-xs font-bold transition-colors disabled:opacity-50" title="Daftar Titik (Bullet List)">
                <span className="text-lg leading-none">•</span> List
            </button>
            <button onMouseDown={(e) => handleFormat(e, 'insertOrderedList')} disabled={disabled} className="px-3 py-1.5 flex items-center gap-1 text-slate-600 hover:bg-slate-200 rounded-lg text-xs font-bold transition-colors disabled:opacity-50" title="Daftar Angka (Number List)">
                <span className="text-xs leading-none">1.</span> List
            </button>
            
            <div className="w-px h-5 bg-slate-300 mx-1"></div>
            
            <button onMouseDown={(e) => handleFormat(e, 'removeFormat')} disabled={disabled} className="px-3 py-1.5 text-slate-500 hover:bg-red-100 hover:text-red-600 rounded-lg text-xs font-bold transition-colors ml-auto disabled:opacity-50" title="Bersihkan Format Teks">
                🗑️ Bersih Format
            </button>
          </div>

          <div
            ref={editorRef}
            contentEditable={!disabled}

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        const executeWithProgress = async (statusMsg, successMsg, action) => {
            if (stopRef.current) throw new Error("STOP");
            setAutopilotStatus(statusMsg);
            setIsTaskRunning(true);
            try {
                await action();
                setTaskProgress(100);
                showToast(successMsg);

                setIsTaskRunning(false);
                setTaskProgress(0); 
            }

      const handleExport = async (format) => {
        if (!ebook) return;
        
        const authorPen = ebook.authorName || 'Tanpa Nama';
        const dict = getDict(ebook.language); 
        
        const cleanContentForExport = (html) => {
            if (!html) return format === 'txt' ? "[Konten belum dibuat]" : "<p><i>Konten belum dibuat.</i></p>";
            let clean = html.trim();
            let previousClean = "";
            while (clean !== previousClean) {
                previousClean = clean;
                clean = clean.replace(/^(?:<br\s*\/?>|<p>\s*<\/p>|\s)+/gi, '').trim();
                clean = clean.replace(/^<h[1-6][^>]*>.*?<\/h[1-6]>/is, '').trim();
                const pStrongMatch = clean.match(/^<p>\s*<strong[^>]*>(.*?)<\/strong>\s*<\/p>/is);
                if (pStrongMatch && pStrongMatch[1].length < 60) {
                    clean = clean.replace(/^<p>\s*<strong[^>]*>.*?<\/strong>\s*<\/p>/is, '').trim();
                }
            }
            return format === 'txt' ? stripHTML(clean) : clean;
        };
        
        if (format === 'txt') {
            let contentStr = `[ ${dict.exclusiveEbook} ]\n\n${ebook.selectedTitle.toUpperCase()}\n${ebook.subtitle}\n${dict.by}: ${authorPen}\n\n`;

              contentStr += `\n${dict.chapter} ${cIdx + 1}: ${c.title.toUpperCase()}\n`;

                  contentStr += `\n${s}\n${cleanContentForExport(contentMap[c.id]?.[i])}\n`;

            });
            if (ebook.outroContent) contentStr += `\n${dict.conclusion}\n${cleanContentForExport(ebook.outroContent)}\n\n`;

                    return pdf;

        }

                          <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-white/90 backdrop-blur-sm rounded-2xl border border-[#6956e8]/20">
                              <span className="text-2xl mb-2">👤</span>
                              <span className="text-[10px] font-black text-[#6956e8] mb-2 uppercase tracking-widest">Menulis Bio... {manualProgress}%</span>
                              <div className="w-1/2 bg-slate-200 rounded-full h-1.5 overflow-hidden">
                                <div className="bg-[#6956e8] h-full transition-all duration-300" style={{ width: `${manualProgress}%` }}></div>
                              </div>
                          </div>
                        )}
                        <RichTextEditor 
                          value={ebook.authorBio || ""}
                          onChange={(val) => updateEbookField('authorBio', val)}
                          isError={ebook.authorBio?.includes("Error:")}
                          disabled={isAutoGenerating || !!generatingExtra}
                          minHeight="4rem"
                          className={`p-4 text-[11px] lg:text-[13px] ${ebook.authorBio?.includes("Error:") ? "text-red-600" : "text-slate-800"}`}
                          placeholder="Klik BIO atau Autopilot untuk membuat konten..."
                        />
                      </div>
                  </div>
                </div>

                <div className="bg-white rounded-[32px] border border-slate-200 shadow-sm p-6 lg:p-8">
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                    <div>
                      <h3 className="font-black text-lg text-slate-800 uppercase tracking-tighter">{uiDict.toc} Dinamis</h3>
                      <p className="text-[10px] font-bold text-slate-400 mt-1">Struktur ini dibuat secara khusus oleh AI untuk buku Anda.</p>
                    </div>
                    <button onClick={handleCopyTOC} disabled={isAutoGenerating} className={`px-4 py-2 rounded-xl font-black text-[10px] transition-all shadow-sm ${tocCopied ? "bg-green-500 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>
                      {tocCopied ? "TERSALIN ✓" : `SALIN ${uiDict.toc}`}
                    </button>
                  </div>
                  <div className="space-y-4 md:columns-2 lg:columns-3 xl:columns-4 gap-6">
                    {(ebook.chapters || []).map((c, i) => (
                      <div key={c.id} className="border-l-2 border-[#6956e8]/20 pl-4 mb-6 break-inside-avoid">
                        <h4 className="font-black text-sm text-[#6956e8] mb-2">{uiDict.chapter} {i + 1}: {c.title}</h4>
                        <ul className="space-y-1">
                          {(c.subBab || []).map((sb, j) => (
                            <li key={j} className="text-xs font-medium text-slate-600 flex items-center gap-2">
                              <span className="w-1 h-1 bg-slate-300 rounded-full"></span> {sb}
                            </li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                  {(ebook.chapters || []).map(c => (
                    <ChapterCard 
                      key={c.id} 
                      chapter={c} 
                      onGenerateContent={generateSubBabContent}
                      onContentUpdate={updateContent} 
                      initialContent={contentMap[c.id]} 
                      isAutoGenerating={isAutoGenerating}
                      langDict={uiDict}
                    />
                  ))}
                </div>

              </div>
            )}
          </div>
        </div>
      );
    }

    function initApp() {
      if (!window._FirebaseModules) {
        setTimeout(initApp, 50);
        return;
      }

      ({
        initializeApp, getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection,
        getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged
      } = window._FirebaseModules);

      const firebaseConfigStr = typeof window.__firebase_config !== 'undefined' && window.__firebase_config ? window.__firebase_config : '{}';
      const firebaseConfig = typeof firebaseConfigStr === 'string' ? JSON.parse(firebaseConfigStr || '{}') : firebaseConfigStr;
      
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'ebook-asia-pro-v46';
      initialAuthToken = typeof window.__initial_auth_token !== 'undefined' ? window.__initial_auth_token : undefined;

      const rootElement = document.getElementById("root");
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
      }
    }

    initApp();
  </script>
</body>
</html>
